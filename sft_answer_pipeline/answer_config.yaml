data:
  build: true
  source_dataset: simplescaling/s1K-1.1
  arrow_path: null
  raw_output_dir: data/S1K
  light_output_dir: data/S1K_light
  output_dir: sft_answer_pipeline/data
  valid_ratio: 0.10
  test_ratio: 0.10
  seed: 42
  reasoning_source_priority: ["deepseek", "gemini"]
  reasoning_text_source: thinking
  answer_field: solution
  max_answer_chars: 320
  max_answer_tokens: 64
  reasoning_crop:
    enabled: true
    safety_margin_tokens: 8
    keep_first_sentences: 2
    keep_last_sentences: 2
    keep_anchor_sentences: 5
    max_stride_sentences: 6

run:
  selected: QRA
  execute: true
  evaluate_after_train: true
  generate_after_train: true
  visual_after_train: true

runs:
  QA:
    dataset: QA
    cuda_visible_devices: null
  QAR:
    dataset: QAR
    cuda_visible_devices: null
  QRA:
    dataset: QRA
    cuda_visible_devices: null

model:
  pretrained: louaaron/sedd-medium
  name: medium
  max_length: 1024
  min_target_tokens: 1
  min_target_tokens_by_mode:
    QA: 1
    QAR: 32
    QRA: 1
  drop_overlength: true
  write_load_reports: true

training:
  steps: 1500
  batch_size: 1
  accum: 8
  lr: 3.0e-6
  warmup: 500
  weight_decay: 0.0
  grad_clip: 1.0
  ema: 0.9999
  log_freq: 1
  eval_freq: 25
  eval_batches: 0
  save_freq: 0
  seed: 42
  num_workers: 0

results:
  output_dir: sft_answer_pipeline/modelparameter

eval:
  batch_size: 1
  eval_batches: 0
  num_workers: 0
  datasets: [QRA]

generation:
  num_examples: 5
  steps: 128
  max_length: 1024
  output_dir: sft_answer_pipeline/reports
  dataset: QRA

compare_models:
  pretrained:
    checkpoint: null
  QA:
    checkpoint: sft_answer_pipeline/modelparameter/QA/best.pth
  QAR:
    checkpoint: sft_answer_pipeline/modelparameter/QAR/best.pth
  QRA:
    checkpoint: sft_answer_pipeline/modelparameter/QRA/best.pth
