data:
  build: true
  source_dataset: simplescaling/s1K-1.1
  arrow_path: null
  split_dir: data/s1k_split
  output_dir: sft_answer_pipeline/data
  valid_ratio: 0.10
  test_ratio: 0.10
  seed: 42
  reasoning_source_priority: ["deepseek", "gemini"]

  # solution: pair DeepSeek/Gemini reasoning with the dataset ground-truth solution.
  # matched_attempt: pair DeepSeek reasoning with deepseek_attempt, Gemini reasoning with gemini_attempt.
  # Use matched_attempt only when you care more about trace-answer source consistency than ground-truth correctness.
  answer_source: solution
  answer_field: solution

run:
  # Use "QA", "QAR", or "all".  QAR is the main reasoning-trace SFT experiment.
  selected: QAR
  execute: true

runs:
  QA:
    dataset: QA
    cuda_visible_devices: null
  QAR:
    dataset: QAR
    cuda_visible_devices: null

model:
  pretrained: louaaron/sedd-medium
  name: medium
  # 512 is safer on small GPUs but will drop most long QAR samples.
  # 1024/2048 keeps more reasoning traces but costs much more memory.
  max_length: 512
  min_target_tokens: 32
  drop_overlength: true
  write_load_reports: true

training:
  steps: 1500
  batch_size: 1
  accum: 8
  lr: 3.0e-6
  warmup: 500
  weight_decay: 0.0
  grad_clip: 1.0
  ema: 0.9999
  log_freq: 1
  eval_freq: 25
  eval_batches: 0
  # 0 disables periodic step checkpoints. Best checkpoints are still saved.
  save_freq: 0
  seed: 42
  num_workers: 0

results:
  output_dir: sft_answer_pipeline/modelparameter

eval:
  batch_size: 1
  eval_batches: 0
  num_workers: 0

generation:
  num_examples: 5
  steps: 128
  max_length: 512
  output_dir: sft_answer_pipeline/reports
