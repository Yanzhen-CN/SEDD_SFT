data:
  build: true
  arrow_path: null
  valid_ratio: 0.05
  seed: 42

run:
  # Use "all", a single name like "QA", "QAR", or a list like ["QA", "QAR"].
  selected: QAR
  # If true, selected runs are launched at the same time.
  # For parallel runs, set different cuda_visible_devices when sharing one server.
  parallel: false
  execute: true

defaults:
  steps: 1500
  length: 512
  batch_size: 8
  log_freq: 25
  eval_freq: 100
  snapshot_freq: 300

runs:
  QA:
    dataset: QA
    cuda_visible_devices: "0"

  QAR:
    dataset: QAR
    cuda_visible_devices: "1"

sedd:
  ngpus: 1
  # Pretrained weights must match the architecture name below.
  model: medium
  pretrained_model: louaaron/sedd-medium
  graph: absorb
  noise: loglinear
  accum: 8
  snapshot_sampling: false
  perplexity: false
  cache_dir: sft_pipeline/cache

optim:
  lr: 1.0e-6
  warmup: 300
  grad_clip: 1.0

results:
  csv_log: false
  save_best: true
  output_dir: sft_pipeline/modelparameter
  save_pretrained_reference: true
  eval_batches: 16
  min_valid_loss: 1.0e-8

comparison:
  pretrained: louaaron/sedd-medium
  qa_run: null
  qar_run: null
  random_like: null
  prefix: "User: Solve the problem carefully.\nAssistant:\n"
  length: 512
  steps: 128
  no_sample: false
  out: sft_pipeline/reports/model_comparison.md
