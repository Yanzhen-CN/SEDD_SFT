data:
  data_dir: sft_rl_pipeline/data/QAR

model:
  pretrained: louaaron/sedd-medium
  init_checkpoint: sft_rl_pipeline/modelparameter/startpoint/pretrained.pth
  max_length: 512
  min_target_tokens: 32
  drop_overlength: true
  write_load_reports: true

reward:
  length_min: 64
  length_max: 60000
  repeat_ngram: 4
  max_char_run: 5
  fatal_repeat_threshold: 0.25
  fatal_char_repeat_threshold: 0.5
  fatal_balance_threshold: 0.15
  fatal_diversity_min_tokens: 12
  fatal_diversity_threshold: 0.2
  normalize_weights: true
  train_weight_min: 0.5
  train_weight_max: 1.5
  rules:
    - name: style_structure
      enabled: true
      weight: 0.4
    - name: math_format
      enabled: true
      weight: 0.3
    - name: final_answer_style
      enabled: true
      weight: 0.2
    - name: length
      enabled: true
      weight: 0.1

best_of_k:
  split: test
  num_examples: 20
  k: 4
  generation_mode: segment_infilling
  steps: 128
  answer_token_budget: 256

training:
  steps: 300
  batch_size: 1
  accum: 8
  lr: 1.0e-6
  warmup: 50
  weight_decay: 0.0
  grad_clip: 1.0
  ema: 0.9999
  log_freq: 10
  eval_freq: 50
  eval_batches: 0
  seed: 42
  num_workers: 0

results:
  output_dir: sft_rl_pipeline/modelparameter/pretrain_rl
  report_dir: sft_rl_pipeline/reports
