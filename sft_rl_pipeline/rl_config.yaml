data:
  data_dir: sft_rl_pipeline/data/QAR
model:
  pretrained: louaaron/sedd-medium
  init_checkpoint: sft_rl_pipeline/modelparameter/startpoint/QAR-best.pth
  max_length: 512
  min_target_tokens: 32
  drop_overlength: true
  write_load_reports: true
reward:
  schema_mode: anchored_qar_content_reward_v4_integer_points_with_negative_penalties
  length_min: 64
  length_max: 60000
  repeat_ngram: 4
  max_char_run: 5
  fatal_repeat_threshold: 0.25
  fatal_char_repeat_threshold: 0.5
  fatal_balance_threshold: 0.15
  fatal_diversity_min_tokens: 12
  fatal_diversity_threshold: 0.2
  normalize_weights: false
  train_weight_min: 0.5
  train_weight_max: 1.5
  rules:
  - name: section_edge_quality
    enabled: true
    weight: 12
  - name: punctuation_correctness
    enabled: true
    weight: 10
  - name: reasoning_keyword_density
    enabled: true
    weight: 20
  - name: reasoning_math_signal
    enabled: true
    weight: 12
  - name: answer_result_quality
    enabled: true
    weight: 20
  - name: section_content_quality
    enabled: true
    weight: 12
  - name: no_repeat
    enabled: true
    weight: 6
  - name: no_mojibake
    enabled: true
    weight: 3
  - name: low_symbol_noise
    enabled: true
    weight: 3
  - name: readability
    enabled: true
    weight: 2
  - name: length_guardrail
    enabled: true
    weight: 2
  - name: reference_overlap
    enabled: false
    weight: 0
  reasoning_min_tokens: 12
  answer_max_tokens: 160
  answer_concise_max_tokens: 80
  reasoning_guardrail_max_tokens: 1600
  answer_guardrail_max_tokens: 220
  lexicon_stats_path: sft_rl_pipeline/reports/s1k_reward_vocab_stats.json
  penalty_bad_reasoning_start: 0.8
  penalty_bad_answer_start: 0.8
  penalty_bad_reasoning_end: 0.88
  penalty_bad_answer_end: 0.92
  penalty_repeated_anchor_in_content: 0.85
  penalty_verbose_answer: 0.9
  answer_soft_max_tokens: 120
  penalty_empty_reasoning_points: 100
  penalty_empty_answer_points: 100
  penalty_bad_reasoning_start_points: 15
  penalty_bad_answer_start_points: 15
  penalty_bad_reasoning_end_points: 8
  penalty_bad_answer_end_points: 5
  penalty_repeated_anchor_points: 12
  penalty_dangling_operator_points: 10
  penalty_verbose_answer_points: 8
  penalty_unbalanced_symbols_points: 25
  penalty_fatal_points: 120
best_of_k:
  split: test
  num_examples: 20
  k: 4
  generation_mode: segment_infilling
  steps: 128
  answer_token_budget: 256
training:
  steps: 300
  batch_size: 1
  accum: 8
  lr: 1.0e-06
  warmup: 50
  weight_decay: 0.0
  grad_clip: 1.0
  ema: 0.9999
  log_freq: 10
  eval_freq: 50
  eval_batches: 0
  seed: 42
  num_workers: 0
results:
  output_dir: sft_rl_pipeline/modelparameter/sft_rl
  report_dir: sft_rl_pipeline/reports
