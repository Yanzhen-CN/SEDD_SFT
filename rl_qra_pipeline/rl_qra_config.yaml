seed: 42
cpu: false

run:
  selected: QRA
  cuda_device: null

rl:
  # True reverse-generation rollout RL.
  # The rollout sampler is aligned with generate_sample_chain and SEDD tau-leaping:
  # each fixed t step samples every answer position independently.
  mode: rollout_chain

model:
  pretrained: louaaron/sedd-medium
  tokenizer: gpt2
  max_length: 768
  min_target_tokens: 1
  drop_overlength: true
  write_load_reports: false

data:
  split: train
  # Cheap fixed mini validation split generated by prepare_rl_data.py.
  eval_split: val-mini
  # Complete validation split used for full_eval_every and final/global best.
  full_eval_split: val
  train_limit: 0
  # Fallback only. Periodic validation is controlled by training.eval_limit below.
  eval_limit: 64

starts:
  pretrain:
    # No local pretrain.pth is required.  This start uses SEDD.from_pretrained(...)
    # and therefore works with the Hugging Face cache/download path.
    pretrained: louaaron/sedd-medium
    init_checkpoint: null
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_pretrain
    output_name: rl_pretrain
  QA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QA
    output_name: rl_QA
  QRA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QRA
    output_name: rl_QRA

training:
  # QRA refine uses batched rollout updates. With samples_per_update=16,
  # 180 optimizer steps = 2880 sample-rollouts; this is deliberately
  # much smaller than the old 1500 single-sample updates to avoid over-RL.
  steps: 100
  # Effective number of different samples used before one optimizer.step().
  # Try 8, 16, 32 depending on GPU memory. Old batch_size is kept as alias.
  samples_per_update: 16
  batch_size: 16
  # Split samples_per_update into smaller groups for memory/control flow.
  # With rollout.memory_safe_replay=true, gradients are normalized by samples_per_update
  # so changing 1 -> 8/16/32 does not implicitly multiply the learning rate.
  micro_batch_size: 8
  # Select samples per update with a simple-focused quota instead of pure random.
  # QRA refine should mostly protect easy/short answers and only lightly expose
  # hard forms each update. For samples_per_update=16, the default quota below is:
  #   integer 4, decimal 3, letter 3, interval 2, unit_decimal 1, symbolic 1, equation 1, inequality 1.
  # Hard kinds are capped at one sample per update unless their cap is raised.
  sample_selector: kind_quota
  sample_kind_order:
    - integer
    - decimal
    - letter
    - interval
    - unit_decimal
    - symbolic
    - equation
    - inequality
  sample_kind_quota:
    integer: 4
    decimal: 3
    letter: 3
    interval: 2
    unit_decimal: 1
    symbolic: 1
    equation: 1
    inequality: 1
  sample_kind_max_per_update:
    symbolic: 1
    equation: 1
    inequality: 1

  lr: 2.0e-7
  weight_decay: 0.0
  grad_clip: 0.5
  ema: 0.9999
  log_every: 1

  # Periodic checkpoint for recovery only. best.pth is selected by validation.
  save_every: 50

  # Dense mini-eval: every step evaluates the fixed val-mini.jsonl subset.
  # This gives a cheap, comparable curve because the 8 mini samples are fixed.
  eval_every: 1
  eval_limit: all

  # Sparse full-eval: every 10 steps evaluates the complete val.jsonl split.
  # best.pth is selected by full validation, not by one training sample and
  # not by the 8-sample mini eval. At the end, best_mini.pth is also
  # full-evaluated once as a cheap safeguard against missing an in-between step.
  full_eval_every: 10
  full_eval_limit: all

  # Conservative checkpoint: best.pth is chosen by full validation loss.
  best_metric: full_eval_loss
  best_mode: min

  # RL/reward-oriented checkpoint: best_reward.pth is chosen by full validation
  # rollout reward, which better reflects slot/type/format alignment.
  best_reward_metric: full_eval_rollout_reward
  best_reward_mode: max

# Old/local RRPI fallback; kept so the same train script can still run rrpi mode.
rrpi:
  mode: rrpi
  states_per_sample: 2
  max_targets_per_state: 8
  reveal_mode: prefix_grid
  base_state: reference_answer_masked
  corrupt_mode: mask
  transition_kind: analytic
  transition_train: true
  step_size: 1.0e-5
  t_min: 0.05
  t_max: 0.95
  include_model_topk: 4
  include_clean_candidates: true
  include_bad_continuations: false
  max_candidates: 32
  reward_temperature: 0.20
  rrpi_weight: 1.0
  sft_anchor_weight: 0.10
  eps: 1.0e-8
  debug_every: 20
  debug_records_per_step: 1
  max_debug_candidates: 10
  max_debug_rows: 8

rollout:
  # Reward can be switched without changing code:
  #   slot_alignment -> pretrain RL / format-slot learning
  #   qra_refine     -> QRA RL / exact-first token-aware refinement
  reward_name: qra_refine

  # Sample-chain-aligned rollout: for each fixed t transition, every answer
  # position is sampled from the SEDD transition distribution. This matches
  # generate_sample_chain.py and the SEDD tau-leaping sampler.
  memory_safe_replay: true
  transition_mode: per_position
  steps: 32
  num_rollouts: 1
  mode: sample

  # Fixed reverse-time grid. This yields 0.9500, 0.9206, ..., 0.0100 for 32 transitions.
  t_start: 0.95
  t_end: 0.01
  schedule: linear
  transition_kind: analytic

  # In aligned per-position rollout, real delta_t is computed from the t grid:
  # delta_t = t_k - t_{k+1}. This step_size field is kept only as fallback
  # for old code paths and should not affect aligned rollout.
  step_size: 1.0e-5

  # Rollout sampling controls.
  sample_temperature: 1.00
  eps: 1.0e-12
  freeze_filled: false

  # Probability-adjustment size. Small values are intentional; prefer multiple
  # RL rounds over one aggressive update.
  policy_loss_scale: 0.006
  advantage_clip: 0.12
  reward_clip: 0.60
  gamma: 0.95
  baseline: raw_clip

  # Stabilizers.
  entropy_weight: 0.0005
  sft_anchor_scale: 0.012
  anchor_late_power: 1.0

  debug_every: 20
  debug_records_per_step: 1
  max_debug_steps: 32

eval:
  split: test
  datasets:
    - S1K_RL
    - QRA
  compare_models:
    QRA_base:
      checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    rl_QRA:
      checkpoint: rl_qra_pipeline/modelparameter/rl_QRA/best.pth
