seed: 42
cpu: false

run:
  selected: QRA
  cuda_device: null

rl:
  # True reverse-generation rollout RL.
  # The rollout sampler is aligned with generate_sample_chain and SEDD tau-leaping:
  # each fixed t step samples every answer position independently.
  mode: rollout_chain

model:
  pretrained: louaaron/sedd-medium
  tokenizer: gpt2
  max_length: 768
  min_target_tokens: 1
  drop_overlength: true
  write_load_reports: false

data:
  split: train
  eval_split: val
  train_limit: 0
  # Fallback only. Periodic validation is controlled by training.eval_limit below.
  eval_limit: 64

starts:
  pretrain:
    # No local pretrain.pth is required.  This start uses SEDD.from_pretrained(...)
    # and therefore works with the Hugging Face cache/download path.
    pretrained: louaaron/sedd-medium
    init_checkpoint: null
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_pretrain
    output_name: rl_pretrain
  QA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QA
    output_name: rl_QA
  QRA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QRA
    output_name: rl_QRA

training:
  # 1500 steps is about 2+ passes over the current S1K_RL train split.
  steps: 1500
  batch_size: 1
  lr: 5.0e-7
  weight_decay: 0.0
  grad_clip: 0.5
  ema: 0.9999
  log_every: 1

  # Periodic checkpoint for recovery only. best_run.pth is selected by validation.
  save_every: 500

  # Validation-based checkpoint selection.
  # eval_limit: all means every validation run uses the full val split.
  # This is slower, but gives the most representative eval_loss curve and best_run.pth.
  eval_every: 1
  eval_limit: all
  best_metric: eval_loss
  best_mode: min

# Old/local RRPI fallback; kept so the same train script can still run rrpi mode.
rrpi:
  mode: rrpi
  states_per_sample: 2
  max_targets_per_state: 8
  reveal_mode: prefix_grid
  base_state: reference_answer_masked
  corrupt_mode: mask
  transition_kind: analytic
  transition_train: true
  step_size: 1.0e-5
  t_min: 0.05
  t_max: 0.95
  include_model_topk: 4
  include_clean_candidates: true
  include_bad_continuations: false
  max_candidates: 32
  reward_temperature: 0.20
  rrpi_weight: 1.0
  sft_anchor_weight: 0.10
  eps: 1.0e-8
  debug_every: 20
  debug_records_per_step: 1
  max_debug_candidates: 10
  max_debug_rows: 8

rollout:
  # Sample-chain-aligned rollout: for each fixed t transition, every answer
  # position is sampled from the SEDD transition distribution. This matches
  # generate_sample_chain.py and the SEDD tau-leaping sampler.
  memory_safe_replay: true
  transition_mode: per_position
  steps: 32
  num_rollouts: 1
  mode: sample

  # Fixed reverse-time grid. This yields 0.9500, 0.9206, ..., 0.0100 for 32 transitions.
  t_start: 0.95
  t_end: 0.01
  schedule: linear
  transition_kind: analytic

  # In aligned per-position rollout, real delta_t is computed from the t grid:
  # delta_t = t_k - t_{k+1}. This step_size field is kept only as fallback
  # for old code paths and should not affect aligned rollout.
  step_size: 1.0e-5

  # Rollout sampling controls.
  sample_temperature: 1.00
  eps: 1.0e-12
  freeze_filled: false

  # Probability-adjustment size. Small values are intentional; prefer multiple
  # RL rounds over one aggressive update.
  policy_loss_scale: 0.02
  advantage_clip: 0.25
  reward_clip: 1.00
  gamma: 0.95
  baseline: reward_to_go_norm

  # Stabilizers.
  entropy_weight: 0.0005
  sft_anchor_scale: 0.005
  anchor_late_power: 1.0

  debug_every: 20
  debug_records_per_step: 1
  max_debug_steps: 32

eval:
  split: test
  datasets:
    - S1K_RL
    - QRA
  compare_models:
    QRA_base:
      checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    rl_QRA:
      checkpoint: rl_qra_pipeline/modelparameter/rl_QRA/best.pth
