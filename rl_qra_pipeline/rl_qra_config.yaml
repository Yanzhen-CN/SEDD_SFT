seed: 42
cpu: false

run:
  selected: QRA
  cuda_device: null

model:
  pretrained: louaaron/sedd-medium
  tokenizer: gpt2
  max_length: 1024
  min_target_tokens: 1
  drop_overlength: true
  write_load_reports: false

data:
  split: train
  eval_split: val
  train_limit: 0
  eval_limit: 128

starts:
  pretrain:
    init_checkpoint: rl_qra_pipeline/modelparameter/pretrain/pretrain.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_pretrain
    output_name: rl_pretrain

  QA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QA
    output_name: rl_QA

  QRA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QRA
    output_name: rl_QRA

training:
  steps: 1200
  batch_size: 1
  lr: 2.0e-6
  weight_decay: 0.0
  grad_clip: 1.0
  ema: 0.9999
  log_every: 1
  save_every: 100

reward:
  answer_weight: 0.80
  reason_weight: 0.20
  reasoning_min_tokens: 8
  reasoning_guardrail_max_tokens: 1600

rrpi:
  states_per_sample: 2
  max_targets_per_state: 8
  reveal_mode: prefix_grid
  base_state: reference_answer_masked
  corrupt_mode: mask
  transition_kind: analytic
  transition_train: true
  step_size: 1.0e-5
  t_min: 0.05
  t_max: 0.95
  include_model_topk: 4
  include_clean_candidates: true
  include_bad_continuations: false
  max_candidates: 32
  reward_temperature: 0.10
  min_reward_gap: 0.0
  rrpi_weight: 1.0
  sft_anchor_weight: 0.05
  eps: 1.0e-8
  debug_every: 20
  debug_records_per_step: 2
  max_debug_candidates: 10
  max_debug_rows: 8

guided:
  states_per_sample: 2

output:
  root_dir: rl_qra_pipeline/modelparameter
  # root of selected start still only keeps global best files under starts.QRA.output_dir.
  best_metric: eval_loss
  best_metric_mode: min

eval:
  split: test
  datasets:
    - S1K_RL
    - QRA
  output_dir: rl_qra_pipeline/test_result
  batch_size: 1
  num_workers: 0
  eval_batches: 0

compare_models:
  QRA_base:
    checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
  rl_QRA:
    checkpoint: rl_qra_pipeline/modelparameter/rl_QRA/best.pth
