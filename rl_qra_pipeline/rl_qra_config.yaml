seed: 42
cpu: false

run:
  selected: QRA
  cuda_device: null

rl:
  # True reverse-generation rollout RL.
  # The rollout action is a joint (answer_slot, token) decision, and the main
  # reward is position-type alignment for that slot.
  mode: rollout_chain

model:
  pretrained: louaaron/sedd-medium
  tokenizer: gpt2
  # 1024 is possible on larger cards, but rollout RL is much heavier than SFT
  # because one sample contains many reverse-time forwards.  Use 768 first; lower to 512 only if a single replay step still OOM.
  max_length: 768
  min_target_tokens: 1
  drop_overlength: true
  write_load_reports: false

data:
  split: train
  eval_split: val
  train_limit: 0
  eval_limit: 64

starts:
  pretrain:
    init_checkpoint: rl_qra_pipeline/modelparameter/pretrain/pretrain.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_pretrain
    output_name: rl_pretrain

  QA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QA
    output_name: rl_QA

  QRA:
    init_checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    data_dir: rl_qra_pipeline/data/S1K_RL
    output_dir: rl_qra_pipeline/modelparameter/rl_QRA
    output_name: rl_QRA

training:
  # Conservative first run.  Prefer small updates and multiple rounds.
  steps: 300
  batch_size: 1
  lr: 5.0e-7
  weight_decay: 0.0
  grad_clip: 0.5
  ema: 0.9999
  log_every: 1
  save_every: 100

# Old/local RRPI fallback; kept so the same train script can still run rrpi mode.
rrpi:
  mode: rrpi
  states_per_sample: 2
  max_targets_per_state: 8
  reveal_mode: prefix_grid
  base_state: reference_answer_masked
  corrupt_mode: mask
  transition_kind: analytic
  transition_train: true
  step_size: 1.0e-5
  t_min: 0.05
  t_max: 0.95
  include_model_topk: 4
  include_clean_candidates: true
  include_bad_continuations: false
  max_candidates: 32
  reward_temperature: 0.20
  rrpi_weight: 1.0
  sft_anchor_weight: 0.10
  eps: 1.0e-8
  debug_every: 20
  debug_records_per_step: 1
  max_debug_candidates: 10
  max_debug_rows: 8

rollout:
  # Real generate-chain RL: answer all-mask -> repeated reverse actions.
  # Memory-safe replay samples the chain with no_grad, then replays each action
  # one-by-one with grad.  This prevents storing all rollout-step graphs.
  memory_safe_replay: true
  steps: 32
  num_rollouts: 1
  mode: sample

  # Reverse time schedule.  Early high t emphasizes position-type alignment;
  # late low t emphasizes exact correction.
  t_start: 0.95
  t_end: 0.01
  step_size: 1.0e-5
  transition_kind: analytic

  # Joint action policy over (answer slot, token).  We restrict candidates to
  # avoid full-vocab reward hacking, but still include model top-k.
  action_topk: 16
  max_candidates_per_position: 24
  include_gt_candidates: true
  include_current_candidate: true
  allow_noop_action: true
  sample_temperature: 1.20
  eps: 1.0e-12

  # Main knob for probability adjustment size.
  # First round: 0.02.  Later ablate 0.05 only if chain alignment improves slowly.
  policy_loss_scale: 0.02
  advantage_clip: 0.25
  reward_clip: 1.00
  gamma: 0.95
  baseline: reward_to_go_norm

  # Stabilizers.
  entropy_weight: 0.0005
  sft_anchor_scale: 0.005
  anchor_late_power: 1.0
  freeze_filled: false

  debug_every: 20
  debug_records_per_step: 1
  max_debug_steps: 12

eval:
  split: test
  datasets:
    - S1K_RL
    - QRA
  compare_models:
    QRA:
      checkpoint: rl_qra_pipeline/modelparameter/QRA/best.pth
    rl_QRA:
      checkpoint: rl_qra_pipeline/modelparameter/rl_QRA/best.pth
    pretrain: